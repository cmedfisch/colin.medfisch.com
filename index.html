<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colin Medfisch - Senior Product Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0d0d0d;
            color: #e0e0e0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        /* Avatar with spinning glow ring */
        .avatar-wrapper {
            position: relative;
            width: 170px;
            height: 170px;
            margin: 0 auto 2rem;
        }
        .avatar-ring {
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: conic-gradient(#7c4dff, #b388ff, #ce93d8, #7c4dff);
            animation: spin 3s linear infinite;
            opacity: 0;
        }
        .avatar {
            position: relative;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            margin: 5px;
            overflow: hidden;
            background: #0d0d0d;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
        }

        /* Elements start hidden */
        h1, .title, .org, .linkedin-btn {
            opacity: 0;
            transform: translateY(20px);
        }

        /* Loaded state animations */
        .loaded .avatar-ring {
            animation: spin 3s linear infinite, fadeIn 0.6s ease forwards;
        }
        .loaded .avatar img {
            animation: fadeIn 0.8s ease 0.3s forwards;
        }
        .loaded h1 {
            animation: slideUp 0.6s ease 0.6s forwards;
        }
        .loaded .title {
            animation: slideUp 0.6s ease 0.8s forwards;
        }
        .loaded .org {
            animation: slideUp 0.6s ease 1s forwards;
        }
        .loaded .linkedin-btn {
            animation: slideUp 0.6s ease 1.2s forwards;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: #b388ff;
            margin-bottom: 0.5rem;
        }
        .title {
            font-size: 1.1rem;
            color: #ce93d8;
            margin-bottom: 0.3rem;
        }
        .org {
            font-size: 1rem;
            color: #9e9e9e;
            margin-bottom: 2.5rem;
        }
        .linkedin-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.75rem;
            background: transparent;
            border: 2px solid #7c4dff;
            color: #b388ff;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .linkedin-btn:hover {
            background: #7c4dff;
            color: #0d0d0d;
            box-shadow: 0 0 20px rgba(124, 77, 255, 0.4);
        }
        .linkedin-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar-wrapper">
            <div class="avatar-ring"></div>
            <div class="avatar"><img src="headshot.jpg" alt="Colin Medfisch"></div>
        </div>
        <h1>Colin Medfisch</h1>
        <p class="title">Senior Product Manager - Identity Strategy</p>
        <p class="org">Duo @ Cisco</p>
        <a href="https://www.linkedin.com/in/cmedfisch/" target="_blank" rel="noopener noreferrer" class="linkedin-btn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            LinkedIn
        </a>
    </div>
    <script>
        window.addEventListener('load', () => {
            document.querySelector('.container').classList.add('loaded');
        });
    </script>
</body>
</html>
